{% extends "base.html" %}

{% block title %}Edit Notice - Officer Portal{% endblock %}

{% block extra_css %}
<style>
    .edit-notice-hero {
        padding: 50px 0;
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        color: white;
        border-radius: 0 0 50px 50px;
        margin-bottom: -30px;
    }

    .form-card {
        background: white;
        border-radius: 35px;
        padding: 45px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        border: 1px solid #fef3c7;
    }

    .form-label {
        font-weight: 700;
        color: #78350f;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .form-control,
    .form-select {
        border-radius: 16px;
        padding: 12px 20px;
        border: 1px solid #fde68a;
        background: #fffbeb;
    }

    .form-control:focus,
    .form-select:focus {
        background: white;
        border-color: #f59e0b;
        box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
    }

    textarea.form-control {
        min-height: 150px;
    }

    .submit-btn {
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        border: none;
        padding: 15px 40px;
        border-radius: 100px;
        font-weight: 700;
        color: white;
        transition: all 0.3s;
    }

    .submit-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
    }
</style>
{% endblock %}

{% block content %}
<div class="edit-notice-hero">
    <div class="container">
        <a href="{{ url_for('officer.notices') }}"
            class="text-white text-opacity-75 text-decoration-none small fw-bold mb-2 d-inline-block">
            <i class="bi bi-chevron-left"></i> BACK TO NOTICES
        </a>
        <h1 class="fw-bold"><i class="bi bi-pencil-square me-2"></i>Edit Notice</h1>
        <p class="opacity-75 mb-0">Update announcement details and settings</p>
    </div>
</div>

<div class="container pb-5">
    <div class="row justify-content-center mt-5">
        <div class="col-lg-10">
            <div class="form-card">
                <form method="POST">
                    <div class="row g-4">
                        <div class="col-12">
                            <label for="title" class="form-label">Notice Title <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" value="{{ notice.title }}"
                                required>
                        </div>

                        <div class="col-12">
                            <label for="content" class="form-label">Content <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="content" name="content" rows="6"
                                required>{{ notice.content }}</textarea>
                        </div>

                        <div class="col-md-4">
                            <label for="category" class="form-label">Category</label>
                            <select class="form-select" id="category" name="category">
                                <option value="">Select Category</option>
                                {% for cat in categories %}
                                <option value="{{ cat.lower() }}" {{ 'selected' if cat.lower()==(notice.category or '' )
                                    }}>
                                    {{ cat }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="priority" class="form-label">Priority</label>
                            <select class="form-select" id="priority" name="priority">
                                {% for pri in priorities %}
                                <option value="{{ pri.lower() }}" {{ 'selected' if pri.lower()==(notice.priority
                                    or 'normal' ) }}>
                                    {{ pri }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="target_audience" class="form-label">Target Audience</label>
                            <select class="form-select" id="target_audience" name="target_audience">
                                {% for aud in audiences %}
                                <option value="{{ aud.lower() }}" {{ 'selected' if aud.lower()==notice.target_audience
                                    }}>
                                    {{ aud }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-12">
                            <label for="expires_at" class="form-label">Expiry Date (Optional)</label>
                            <input type="date" class="form-control" id="expires_at" name="expires_at"
                                value="{{ notice.expires_at.strftime('%Y-%m-%d') if notice.expires_at else '' }}">
                            <small class="text-muted">Leave empty for notices that don't expire</small>
                        </div>

                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="is_active" name="is_active"
                                    {{ 'checked' if notice.is_active }}>
                                <label class="form-check-label fw-bold text-dark" for="is_active">
                                    Active Notice
                                </label>
                            </div>
                        </div>

                        <div class="col-12 mt-5">
                            <div class="d-flex justify-content-end gap-3">
                                <a href="{{ url_for('officer.notices') }}"
                                    class="btn btn-light rounded-pill px-5 py-3 fw-bold">
                                    Cancel
                                </a>
                                <button type="submit" class="submit-btn">
                                    <i class="bi bi-check-circle me-2"></i> Update Notice
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
