{% extends "base.html" %}

{% block title %}Admin Login - AgroPortal{% endblock %}

{% block extra_css %}
<style>
    body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }

    .login-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top right, #e11d48 0%, #9f1239 100%);
        padding: 20px;
    }

    .glass-login-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        width: 100%;
        max-width: 450px;
        padding: 40px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }

    .login-header h2 {
        font-weight: 800;
        color: #9f1239;
        letter-spacing: -1px;
    }

    .form-floating>.form-control:focus {
        border-color: #e11d48;
        box-shadow: 0 0 0 0.25rem rgba(225, 29, 72, 0.1);
    }

    .btn-login {
        background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
        border: none;
        padding: 14px;
        border-radius: 16px;
        font-weight: 700;
        transition: all 0.3s ease;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(190, 18, 60, 0.2);
    }

    .back-btn {
        position: absolute;
        top: 30px;
        left: 30px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        color: white;
        padding: 10px 20px;
        border-radius: 100px;
        text-decoration: none;
        font-weight: 600;
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .back-btn:hover {
        background: white;
        color: #9f1239;
    }

    .role-switcher {
        background: #f1f5f9;
        border-radius: 20px;
        padding: 20px;
        margin-top: 30px;
    }

    .role-link {
        color: #64748b;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.85rem;
        display: block;
        padding: 5px 0;
    }

    .role-link:hover {
        color: #e11d48;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <a href="{{ url_for('main.index') }}" class="back-btn"><i class="bi bi-arrow-left me-2"></i> Portal Home</a>

    <div class="glass-login-card">
        <div class="login-header text-center mb-5">
            <div class="rounded-circle d-inline-flex p-3 mb-3 bg-danger bg-opacity-10">
                <i class="bi bi-shield-lock-fill fs-1 text-danger"></i>
            </div>
            <h2>Admin Login</h2>
            <p class="text-muted">System configuration & global management.</p>
        </div>

        <form method="POST" action="{{ url_for('auth.admin_login') }}">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="Username" required
                    autofocus>
                <label for="username">Username</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password"
                    required>
                <label for="password">Password</label>
                <button class="btn border-0 position-absolute end-0 top-50 translate-middle-y me-2" type="button"
                    onclick="const p=document.getElementById('password'); if(p.type==='password'){p.type='text';this.innerHTML='<i class=\'bi bi-eye-slash\'></i>';}else{p.type='password';this.innerHTML='<i class=\'bi bi-eye\'></i>';}">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <div class="form-check mb-4">
                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                <label class="form-check-label small" for="remember">Keep me logged in</label>
            </div>
            <button type="submit" class="btn btn-login btn-danger w-100 text-white mb-4">
                System Access <i class="bi bi-key ms-1"></i>
            </button>
        </form>

        <div class="role-switcher text-center">
            <h6 class="small fw-bold text-muted text-uppercase mb-3">Switch User Role</h6>
            <div class="row g-2">
                <div class="col-6"><a href="{{ url_for('auth.farmer_login') }}"
                        class="role-link border rounded-pill">Farmer Portal</a></div>
                <div class="col-6"><a href="{{ url_for('auth.expert_login') }}"
                        class="role-link border rounded-pill">Agro Expert</a></div>
                <div class="col-12 mt-2"><a href="{{ url_for('auth.krishi_bhavan_officer_login') }}"
                        class="role-link border rounded-pill">Officer Login</a></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
